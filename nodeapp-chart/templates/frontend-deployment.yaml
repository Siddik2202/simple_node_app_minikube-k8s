apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: {{ .Values.frontend.repository }}:{{ .Values.frontend.tag }}
        imagePullPolicy:  {{ .Values.frontend.pullPolicy }}
        ports:
        - containerPort: 80
