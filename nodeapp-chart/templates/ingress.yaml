apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myapp-ingress
  namespace: {{ .Release.Namespace }}
spec:
  ingressClassName: nginx  # <--- ADD THIS LINE
  rules:
  - host: nodeapp.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80

      - path: /submit
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 3000
