# Global settings
replicaCount: 2

# Frontend Configuration
frontend:
  repository: siddik811/node-frontend
  tag: "latest"
  pullPolicy: Always
  service:
    type: NodePort
    port: 80
    nodePort: 30007  # The port used in your browser

# Backend Configuration
backend:
  repository: siddik811/node-backend
  tag: "latest"
  pullPolicy: Always
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  service:
    type: NodePort
    port: 3000
    nodePort: 30008  # The port for API access

# MySQL Configuration
mysql:
  image: mysql:5.7
  rootPassword: "root"
  database: "sampledb"
  persistence:
    enabled: false

# Database connection details (Fixes the Helm error)
db:
  host: mysql
  user: root
  name: sampledb
